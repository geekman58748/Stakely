[toolchain]
anchor_version = "0.31.0"

[features]
resolution = true
skip-lint = false

[programs.devnet]
stakely_escrow = "J2zMD6jRMFetFr82nqk1jBsmdSYSuDKKsbfnJRqHRcai"

[programs.mainnet]
# Fill in after: anchor build && anchor deploy --provider.cluster mainnet-beta
# Then run: npm run deploy (initializes GlobalConfig with keeper wallet)
stakely_escrow = "FILL_AFTER_MAINNET_DEPLOY"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx tsx node_modules/mocha/bin/mocha -t 1000000 tests/**/*.ts"
